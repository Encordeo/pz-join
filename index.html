<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Joining server...</title>
<style>
  body { background: #1e1f22; color: #e8e9eb; font-family: sans-serif; text-align: center; padding-top: 3rem; }
  code { background: #111214; padding: 0.3rem 0.6rem; border-radius: 4px; }
  a { color: #43b581; }
</style>
</head>
<body>
  <p id="msg">Opening Steam...</p>
  <p>If nothing happens, <a id="link" href="#">click here</a>.</p>
  <p>Or paste this into the game console:</p>
  <code id="cmd"></code>

  <script>
    const params = new URLSearchParams(window.location.search);
    const server = params.get("server");
    if (server) {
      const steamUri = "steam://connect/" + server;
      document.getElementById("link").href = steamUri;
      document.getElementById("cmd").textContent = "connect " + server;
      window.location.href = steamUri;
    } else {
      document.getElementById("msg").textContent = "No server address provided.";
    }
  </script>
</body>
</html>
